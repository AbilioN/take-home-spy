<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Location history</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Admin</h1>
      <div id="login-box" class="panel">
        <h2>Login</h2>
        <form id="login-form">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Sign in</button>
        </form>
        <p id="login-error" class="error"></p>
      </div>
      <div id="user-list-box" class="panel hidden">
        <h2>Users</h2>
        <button type="button" id="logout-btn">Log out</button>
        <ul id="user-list"></ul>
      </div>
    </aside>
    <main class="main">
      <div id="map-placeholder" class="map-placeholder">
        <p>Select a user to view their location history on the map.</p>
      </div>
      <div id="map-container" class="map-container hidden"></div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
